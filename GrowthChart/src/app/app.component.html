<div class="container">

  <div class="form-header">
    <h1>Growth Chart</h1>
    <p>Enter the Patient UHID to load the chart</p>
  </div>

  <!-- UHID input -->
  <div class="form-group">
    <label for="uhidInput">UHID</label>
    <input
      id="uhidInput"
      type="text"
      [(ngModel)]="uhid"
      (input)="onUhidInput()"
      (keyup.enter)="openChart()"
      placeholder="e.g. OP1615352"
      maxlength="50"
      autocomplete="off"
    />
  </div>

  <!-- Lookup spinner
  <div *ngIf="isLooking" class="age-preview">Looking up patient…</div>

  <!-- Patient preview card 
  <div *ngIf="patient" class="patient-card">
    <div class="patient-card__row">
      <span class="patient-card__label">UHID</span>
      <span class="patient-card__value">{{ uhid }}</span>
    </div>
    <div class="patient-card__row">
      <span class="patient-card__label">OP Number</span>
      <span class="patient-card__value">{{ patient.opnumber || '—' }}</span>
    </div>
    <div class="patient-card__row">
      <span class="patient-card__label">Date of Birth</span>
      <span class="patient-card__value">{{ formatDob(patient.dob) }}</span>
    </div>
    <div class="patient-card__row">
      <span class="patient-card__label">Gender</span>
      <span class="patient-card__value">{{ patient.gender | titlecase }}</span>
    </div>
  </div> -->

  <!-- Feedback -->
  <small *ngIf="lookupMessage" [class]="patient ? 'age-preview' : 'field-error'">
    {{ lookupMessage }}
  </small>

  <div *ngIf="errorMessage" class="error-box">{{ errorMessage }}</div>

  <!-- Action button — enabled only when a patient is found -->
  <button
    class="btn-primary"
    (click)="openChart()"
    [disabled]="!patient || isLoading"
  >
    {{ isLoading ? 'Loading…' : 'Open Growth Chart' }}
  </button>

</div>
