<div class="container">
  <h1>Pediatric Growth Chart Data Entry</h1>
  <p class="subtitle">Enter patient information to generate FHIR Bundle with Patient + Observations</p>

  <div class="form-group">
    <label for="nameInput">Patient Name *</label>
    <input id="nameInput" type="text" [(ngModel)]="patientName" maxlength="255" placeholder="e.g., John Smith" />
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="dobInput">Date of Birth *</label>
      <input
        id="dobInput"
        type="date"
        [(ngModel)]="dob"
        [max]="maxDate"
        [min]="minDate"
      />
      <small *ngIf="dob" style="color:#2563eb; font-weight:600; margin-top:4px; display:block;">
        Age: {{ getAgeDisplay() }}
      </small>
    </div>
    <div class="form-group">
      <label for="genderSelect">Gender *</label>
      <select id="genderSelect" [(ngModel)]="gender">
        <option value="other">Select gender</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
      </select>
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="heightInput">Height (cm)</label>
      <input id="heightInput" type="number" [(ngModel)]="height" min="0" step="0.1" placeholder="e.g., 120.5" />
    </div>
    <div class="form-group">
      <label for="weightInput">Weight (kg)</label>
      <input id="weightInput" type="number" [(ngModel)]="weight" min="0" step="0.1" placeholder="e.g., 20.5" />
    </div>
  </div>

  <div class="form-group">
    <label for="obsDateInput">
      Observation Date
      <span style="color:#6b7280; font-weight:400;">(leave blank for today)</span>
    </label>
    <input
      id="obsDateInput"
      type="date"
      [(ngModel)]="observationDate"
      [max]="maxDate"
    />
  </div>

  <!-- Error message -->
  <div *ngIf="errorMessage" class="error-box">
      {{ errorMessage }}
  </div>

  <!-- Success message -->
  <div *ngIf="successMessage" class="success-box">
     {{ successMessage }}
  </div>  

  <!-- Submit button -->
  <button class="btn-primary" (click)="onSubmit()" [disabled]="isLoading">
    {{ isLoading ? 'Sending to server...' : 'Submit Patient Data' }}
  </button>
</div>
